version: "3.1"

services:
  php:
    container_name: training-php
    build:
      context: ./php
    ports:
      - "${IP}:${PORT_PHP}:80"
    volumes:
      - "../htdocs:/var/www/html"
    restart: always
  mysql:
    container_name: training-mysql
    image: mysql:8.0.27
    restart: always
    volumes:
        - "mysql_data_volume:/var/lib/mysql"
        - "./db:/docker-entrypoint-initdb.d"
    environment:
      - "MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}"
    ports:
      - "${IP}:${PORT_DB}:3306"
  phpmyadmin:
    container_name: training-phpmyadmin
    image: phpmyadmin/phpmyadmin:5.1.1
    restart: always
    ports:
      - "${IP}:${PORT_PHPMYADMIN}:80"
    environment:
      - "PMA_HOST=${DB_HOST_NAME}"
      - "PMA_USER=root"
      - "PMA_PASSWORD=${DB_ROOT_PASSWORD}"
    links:
      - "${DB_HOST_NAME}"
volumes:
  mysql_data_volume:
    name: training-mysql-volume
