version: "3.1"

services:
  php:
    container_name: training-php
    build:
      context: ./php
    ports:
      - 8001:80
    volumes:
      - "../htdocs:/var/www/html"
    restart: always
  mysql:
    container_name: training-mysql
    image: mysql:8.0.27
    restart: always
    volumes:
        - "mysql_data_volume:/var/lib/mysql"
        - "./db:/docker-entrypoint-initdb.d"
    environment:
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - 3306:3306
  phpmyadmin:
    container_name: training-phpmyadmin
    image: phpmyadmin/phpmyadmin:5.1.1
    restart: always
    ports:
      - 8888:80
    environment:
      - PMA_HOST=mysql
      - PMA_USER=root
      - PMA_PASSWORD=root
    links:
      - mysql
volumes:
  mysql_data_volume:
    name: training-mysql-volume
